<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#08080f"/>
  <rect x="60" y="40" width="680" height="320" rx="12" fill="#0e0e12" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="400" y="95" text-anchor="middle" fill="#5B9BFF" font-family="system-ui" font-size="28" font-weight="700">slugify</text>
  <rect x="100" y="130" width="600" height="30" rx="6" fill="#0f1419"/><text x="110" y="150" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="12">import { slugify } from "@alexblack-dev/slugify"</text>
  <rect x="100" y="170" width="600" height="30" rx="6" fill="#0f1419"/><text x="110" y="190" fill="#5B9BFF" font-family="monospace" font-size="12">slugify("Hello World")       // "hello-world"</text>
  <rect x="100" y="210" width="600" height="30" rx="6" fill="#0f1419"/><text x="110" y="230" fill="#a9fef7" font-family="monospace" font-size="12">slugify("Привет, мир!")      // "privet-mir"</text>
  <rect x="100" y="250" width="600" height="30" rx="6" fill="#0f1419"/><text x="110" y="270" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="12">slugify("Café Zürich")       // "cafe-zurich"</text>
</svg>
